  backend-prod:
    build: ./backend
    container_name: yoga-backend-prod
    restart: always
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - PORT=5000
      - NODE_ENV=production
    ports:
      - "5005:5000"

  frontend-prod:
    build: ./frontend
    container_name: yoga-frontend-prod
    restart: always
    environment:
      - BACKEND_HOST=backend-prod
    ports:
      - "81:80"

