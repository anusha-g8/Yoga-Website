name: Yoga Website CI/CD

on:
  push:
    branches: [ main, staging ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Install Frontend Dependencies
        working-directory: Yoga-Website/frontend
        run: npm install
        
      - name: Run Frontend Tests
        working-directory: Yoga-Website/frontend
        run: npm test -- --run

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      # 1. Frontend Build & Deploy to S3
      - name: Build Frontend
        working-directory: Yoga-Website/frontend
        run: |
          echo "export const API_BASE_URL = '/api';" > src/config.js
          npm install
          npm run build
          
      - name: Sync S3
        run: |
          aws s3 sync Yoga-Website/frontend/dist/ s3://${{ secrets.STAGING_S3_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.STAGING_CLOUDFRONT_ID }} --paths "/*"

      # 2. Backend Deploy to EC2
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Ensure tools are installed
            if ! command -v git &> /dev/null; then
              sudo dnf update -y && sudo dnf install -y git
            fi
            if ! docker compose version &> /dev/null; then
              sudo dnf install -y docker-compose-plugin
            fi

            # 2. Sync Repository
            mkdir -p ~/app
            cd ~/app
            if [ ! -d "Yoga-Website" ]; then
              git clone https://github.com/anusha-g8/Yoga-Website.git
            fi
            cd Yoga-Website
            git fetch origin
            git checkout staging
            git pull origin staging

            # 3. Environment and Deployment
            touch .env.staging
            echo "export const API_BASE_URL = '/api';" > frontend/src/config.js
            sudo docker compose --env-file .env.staging up -d --build

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      # 1. Frontend Build & Deploy to S3
      - name: Build Frontend
        working-directory: Yoga-Website/frontend
        run: |
          echo "export const API_BASE_URL = '/api';" > src/config.js
          npm install
          npm run build
          
      - name: Sync S3
        run: |
          aws s3 sync Yoga-Website/frontend/dist/ s3://${{ secrets.PROD_S3_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.PROD_CLOUDFRONT_ID }} --paths "/*"

      # 2. Backend Deploy to EC2
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Ensure tools are installed
            if ! command -v git &> /dev/null; then
              sudo dnf update -y && sudo dnf install -y git
            fi
            if ! docker compose version &> /dev/null; then
              sudo dnf install -y docker-compose-plugin
            fi

            # 2. Sync Repository
            mkdir -p ~/app
            cd ~/app
            if [ ! -d "Yoga-Website" ]; then
              git clone https://github.com/anusha-g8/Yoga-Website.git
            fi
            cd Yoga-Website
            git fetch origin
            git checkout main
            git pull origin main

            # 3. Environment and Deployment
            touch .env.prod
            echo "export const API_BASE_URL = '/api';" > frontend/src/config.js
            sudo docker compose --env-file .env.prod up -d --build
