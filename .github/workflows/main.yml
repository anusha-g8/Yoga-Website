name: Yoga Website CI/CD
# Deployment Trigger: 2026-03-20 15:35
# CloudFront Update Fix: Remove CallerReference

on:
  push:
    branches: [ main, staging ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: |
          echo "export const API_BASE_URL = '/api';" > src/config.js
          echo "export const STRIPE_PUBLISHABLE_KEY = 'pk_test_51TAtb3FmkvhMUNsVRtElmaRrw4vOUxtoFuDF1LfdPTScr1S4pHVZi0jumKk2V51ISnwEqXLAsdOxSwQsdCdwF0fE00SMYTf5aS';" >> src/config.js
          npm install
        
      - name: Run Frontend Tests
        working-directory: frontend
        run: npm test -- --run

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      - name: Run Backend Tests
        working-directory: backend
        run: npm test

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      # 1. Update CloudFront Configuration for API Routing
      - name: Update CloudFront Config (Staging)
        run: |
          # Use jq to remove CallerReference which cannot be modified during update
          # Also ensure we are getting only the DistributionConfig part
          aws cloudfront get-distribution-config --id ${{ secrets.STAGING_CLOUDFRONT_ID }} > full-config.json
          ETAG=$(jq -r '.ETag' full-config.json)
          jq '.DistributionConfig | del(.CallerReference)' full-config.json > staging-config-update.json
          
          # Now merge our local changes (origins and behaviors) into the existing config
          # For simplicity here, we'll use our pre-prepared file but remove the CallerReference
          jq 'del(.CallerReference)' cloudfront-config.json > final-staging-config.json
          
          aws cloudfront update-distribution --id ${{ secrets.STAGING_CLOUDFRONT_ID }} --if-match $ETAG --distribution-config file://final-staging-config.json

      # 2. Frontend Build & Deploy to S3
      - name: Build Frontend
        working-directory: frontend
        run: |
          echo "export const API_BASE_URL = '/api';" > src/config.js
          echo "export const STRIPE_PUBLISHABLE_KEY = 'pk_test_51TAtb3FmkvhMUNsVRtElmaRrw4vOUxtoFuDF1LfdPTScr1S4pHVZi0jumKk2V51ISnwEqXLAsdOxSwQsdCdwF0fE00SMYTf5aS';" >> src/config.js
          npm install
          npm run build
          
      - name: Sync S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.STAGING_S3_BUCKET }} --delete --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ secrets.STAGING_S3_BUCKET }}/index.html --cache-control "max-age=0, no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront (Staging)
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.STAGING_CLOUDFRONT_ID }} --paths "/*"

      # 3. Backend Deploy to EC2
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo dnf update -y && sudo dnf install -y git docker
            sudo mkdir -p /usr/libexec/docker/cli-plugins
            sudo curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m) -o /usr/libexec/docker/cli-plugins/docker-compose
            sudo chmod +x /usr/libexec/docker/cli-plugins/docker-compose
            
            mkdir -p ~/app
            cd ~/app
            if [ ! -d "Yoga-Website" ]; then
              git clone https://github.com/anusha-g8/Yoga-Website.git
            fi
            cd Yoga-Website
            rm -f .git/index.lock
            git fetch --all
            git checkout -f staging
            git reset --hard origin/staging

            # Create environment file
            echo "DB_USER=${{ secrets.DB_USER }}" > .env.staging
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env.staging
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env.staging
            echo "DB_HOST=db" >> .env.staging
            echo "DB_PORT=5432" >> .env.staging
            echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" >> .env.staging
            echo "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" >> .env.staging
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env.staging
            echo "ADMIN_USER=${{ secrets.ADMIN_USER }}" >> .env.staging
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env.staging
            echo "ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}" >> .env.staging
            echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> .env.staging
            echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> .env.staging
            echo "EMAIL_FROM=${{ secrets.EMAIL_FROM }}" >> .env.staging
            
            echo "export const API_BASE_URL = '/api';" > frontend/src/config.js
            echo "export const STRIPE_PUBLISHABLE_KEY = 'pk_test_51TAtb3FmkvhMUNsVRtElmaRrw4vOUxtoFuDF1LfdPTScr1S4pHVZi0jumKk2V51ISnwEqXLAsdOxSwQsdCdwF0fE00SMYTf5aS';" >> frontend/src/config.js
            sudo docker compose --env-file .env.staging up -d --build

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      # 1. Update CloudFront Configuration for API Routing
      - name: Update CloudFront Config (Production)
        run: |
          aws cloudfront get-distribution-config --id ${{ secrets.PROD_CLOUDFRONT_ID }} > full-config-prod.json
          ETAG=$(jq -r '.ETag' full-config-prod.json)
          jq 'del(.CallerReference)' cloudfront-config-prod.json > final-prod-config.json
          aws cloudfront update-distribution --id ${{ secrets.PROD_CLOUDFRONT_ID }} --if-match $ETAG --distribution-config file://final-prod-config.json

      # 2. Frontend Build & Deploy to S3
      - name: Build Frontend
        working-directory: frontend
        run: |
          echo "export const API_BASE_URL = '/api';" > src/config.js
          echo "export const STRIPE_PUBLISHABLE_KEY = 'pk_test_51TAtb3FmkvhMUNsVRtElmaRrw4vOUxtoFuDF1LfdPTScr1S4pHVZi0jumKk2V51ISnwEqXLAsdOxSwQsdCdwF0fE00SMYTf5aS';" >> src/config.js
          npm install
          npm run build
          
      - name: Sync S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.PROD_S3_BUCKET }} --delete --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ secrets.PROD_S3_BUCKET }}/index.html --cache-control "max-age=0, no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront (Production)
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.PROD_CLOUDFRONT_ID }} --paths "/*"

      # 3. Backend Deploy to EC2
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo dnf update -y && sudo dnf install -y git docker
            sudo mkdir -p /usr/libexec/docker/cli-plugins
            sudo curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m) -o /usr/libexec/docker/cli-plugins/docker-compose
            sudo chmod +x /usr/libexec/docker/cli-plugins/docker-compose

            mkdir -p ~/app
            cd ~/app
            if [ ! -d "Yoga-Website" ]; then
              git clone https://github.com/anusha-g8/Yoga-Website.git
            fi
            cd Yoga-Website
            rm -f .git/index.lock
            git fetch --all
            git checkout -f main
            git reset --hard origin/main

            # Create environment file
            echo "DB_USER=${{ secrets.DB_USER }}" > .env.prod
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env.prod
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env.prod
            echo "DB_HOST=db" >> .env.prod
            echo "DB_PORT=5432" >> .env.prod
            echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" >> .env.prod
            echo "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" >> .env.prod
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env.prod
            echo "ADMIN_USER=${{ secrets.ADMIN_USER }}" >> .env.prod
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env.prod
            echo "ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}" >> .env.prod
            echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> .env.prod
            echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> .env.prod
            echo "EMAIL_FROM=${{ secrets.EMAIL_FROM }}" >> .env.prod
            
            echo "export const API_BASE_URL = '/api';" > frontend/src/config.js
            echo "export const STRIPE_PUBLISHABLE_KEY = 'pk_test_51TAtb3FmkvhMUNsVRtElmaRrw4vOUxtoFuDF1LfdPTScr1S4pHVZi0jumKk2V51ISnwEqXLAsdOxSwQsdCdwF0fE00SMYTf5aS';" >> frontend/src/config.js
            sudo docker compose --env-file .env.prod up -d --build
