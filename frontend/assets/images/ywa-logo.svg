<svg width="200" height="82" viewBox="0 0 200 82" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="32" cy="41" r="27" stroke="#2c2420" stroke-width="0.8" fill="none"/>
  <!-- Center prong: smooth tapered blade (cubic bezier) -->
  <path d="M32,14 C29,20 29,30 30,37 L34,37 C35,30 35,20 32,14 Z" fill="#2c2420"/>
  <!-- Left prong: sweeping curved blade -->
  <path d="M16,20 C12,26 18,32 28,37 L31,36 C24,30 17,24 16,20 Z" fill="#2c2420"/>
  <!-- Right prong: mirror -->
  <path d="M48,20 C52,26 46,32 36,37 L33,36 C40,30 47,24 48,20 Z" fill="#2c2420"/>
  <!-- Decorative disc at prong junction -->
  <ellipse cx="32" cy="39" rx="6" ry="2.5" fill="#2c2420"/>
  <!-- Shaft -->
  <rect x="31" y="41" width="2" height="9" rx="1" fill="#2c2420"/>
  <!-- Om below shaft -->
  <text x="32" y="65" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="14"
        fill="#2c2420">ॐ</text>

  <!-- "Yoga" in Great Vibes calligraphic script -->
  <text x="68" y="44"
        font-family="'Great Vibes', 'Palatino Linotype', Palatino, cursive"
        font-size="44"
        fill="#2c2420">Yoga</text>

  <!-- Thin decorative rule (below descenders) -->
  <line x1="68" y1="64" x2="196" y2="64" stroke="#2c2420" stroke-width="0.5"/>

  <!-- "WITH ANUSHA" in Montserrat light, spaced caps -->
  <text x="68" y="76"
        font-family="'Montserrat', 'Gill Sans', sans-serif"
        font-size="9.5"
        font-weight="300"
        letter-spacing="3"
        fill="#2c2420">WITH ANUSHA</text>
</svg>
