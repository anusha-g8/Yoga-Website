services:
  backend:
    build: ./backend
    container_name: yoga-backend
    restart: always
    env_file:
      - .env
    ports:
      - "5001:5000"

  frontend:
    build: ./frontend
    container_name: yoga-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

# Note: Using managed AWS RDS for PostgreSQL database. 
# No local db container needed for production.

